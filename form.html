    <!-- FORM SECTION -->
    <section class="form-section">
        <h2 class="form-title">تسجيل طلب النقل (برنامج يُسر)</h2>
    
        <form class="form-card" id="yusrForm">
            
            <!--<iframe
                src="https://docs.google.com/forms/d/e/1FAIpQLSdY7OkVhF9IEL1qBuM5OcEQvcrsxPFQwQ4OEx_hNGVxMA-JCg/viewform?embedded=true"
                width="500" height="2373" frameborder="0" marginheight="0" marginwidth="0">جارٍ التحميل…
            </iframe>-->
    
            <div class="form-grid">
                <div class="input-box">
                    <label>الاسم الكامل</label>
                    <input type="text" name="full_name" required>
                </div>
    
                <div class="input-box">
                    <label>رقم الهوية / الإقامة / الجواز</label>
                    <input type="text" name="id_number" required>
                </div>
    
                <div class="input-box">
                    <label>رقم الجوال</label>
                    <input type="tel" name="phone" required>
                </div>
    
                <div class="input-box">
                    <label>نوع الهوية</label>
                    <select name="id_type">
                        <option>هوية وطنية</option>
                        <option>إقامة</option>
                        <option>زيارة</option>
                    </select>
                </div>
    
                <div class="input-box">
                    <label>نوع الإعاقة</label>

                    <select name="disability_type">
                        <option> عقلية </option>
                        <option>حركية</option>
                    </select>
                </div>
    
                <div class="input-box full">
                    <label>العنوان السكني</label>
                    <textarea name="address" rows="3" required></textarea>
                </div>
    
                <div class="input-box">
                    <label>اسم المستشفى</label>
                    <input type="text" name="hospital" required>
                </div>
    
                <div class="input-box">
                    <label>تاريخ الموعد</label>
                    <input type="date" name="appointment_date" required>
                </div>
    
                <div class="input-box">
                    <label>وقت الموعد</label>
                    <input type="time" name="appointment_time" required>
                </div>
    
                <div class="input-box full">
                    <label>رفع تقرير طبي</label>
                    <input type="file" name="medical_report">
                </div>

                <div class="input-box full">
                    <label>تفاصيل أخرى؟</label>
                    <textarea name="details" rows="3"></textarea>
                </div>
            </div>
    
            <button type="submit" class="submit-btn">إرسال الطلب</button>
        </form>
    </section>

        <div class="cta-section">
            <div class="cta-title">سجّل الآن في برنامج يُسر</div>
            <p class="cta-sub">الفئة المستهدفة: ذوو الإعاقة داخل مكة المكرمة المحتاجون إلى نقل ميسّر لحضور مواعيدهم الطبية</p>
            <button class="">
                <i class="fa-solid fa-arrow-left"></i>
                تقديم طلب نقل
            </button>
        </div>
        
        <div class="footer-bar">
            <strong>جمعية عطاء المكية لذوي الإعاقة</strong> · مكة المكرمة · برنامج يُسر للنقل الميسّر
        </div>

</body>

<script>
    document.getElementById("yusrForm").addEventListener("submit", async function(e) {
        e.preventDefault();
    
        const formData = new FormData(this);
    
        await fetch("YOUR_SCRIPT_URL", {
            method: "POST",
            body: formData
        });
    
        alert("تم إرسال الطلب بنجاح");
    });
</script>
